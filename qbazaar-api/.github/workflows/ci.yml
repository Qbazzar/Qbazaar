name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Quality (Pint + PHPStan + Pest)
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: qbazaar_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_ENV: development
          MEILI_NO_ANALYTICS: 'true'
        ports:
          - 7700:7700

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, redis, pcntl, posix, gd, zip
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: vendor
          key: ${{ runner.os }}-php83-${{ hashFiles('composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php83-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Prepare .env (testing)
        run: |
          cp .env.example .env
          php artisan key:generate
          # CI overrides
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=root|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=qbazaar_testing|' .env
          sed -i 's|^MEILISEARCH_HOST=.*|MEILISEARCH_HOST=http://127.0.0.1:7700|' .env

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uroot --silent && break
            sleep 1
          done

      - name: Run migrations
        run: php artisan migrate --force --no-interaction

      - name: Laravel Pint
        run: ./vendor/bin/pint --test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=2G --no-progress

      - name: Pest tests
        run: ./vendor/bin/pest --colors=always
