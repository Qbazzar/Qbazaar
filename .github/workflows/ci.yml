name: CI

# Monorepo quality gates. GitHub only reads workflows from the repository-root
# `.github/workflows/`, so the per-package workflow that used to live in
# `qbazaar-api/.github/workflows/` never actually ran. This root workflow runs
# the API and Web gates on every push / PR to the main branches.

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  api:
    name: API — Pint + PHPStan + Pest
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: qbazaar-api

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ALLOW_EMPTY_PASSWORD: 'yes'
          MYSQL_DATABASE: qbazaar_testing
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping --silent"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=10

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

      meilisearch:
        image: getmeili/meilisearch:v1.10
        env:
          MEILI_ENV: development
          MEILI_NO_ANALYTICS: 'true'
        ports:
          - 7700:7700

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up PHP 8.3
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          extensions: mbstring, intl, pdo_mysql, redis, pcntl, posix, gd, zip
          coverage: none
          tools: composer:v2

      - name: Validate composer.json
        run: composer validate --strict

      - name: Cache Composer packages
        uses: actions/cache@v4
        with:
          path: qbazaar-api/vendor
          key: ${{ runner.os }}-php83-${{ hashFiles('qbazaar-api/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-php83-

      - name: Install Composer dependencies
        run: composer install --prefer-dist --no-progress --no-interaction --optimize-autoloader

      - name: Prepare .env (testing)
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's|^DB_HOST=.*|DB_HOST=127.0.0.1|' .env
          sed -i 's|^DB_USERNAME=.*|DB_USERNAME=root|' .env
          sed -i 's|^DB_PASSWORD=.*|DB_PASSWORD=|' .env
          sed -i 's|^DB_DATABASE=.*|DB_DATABASE=qbazaar_testing|' .env
          sed -i 's|^MEILISEARCH_HOST=.*|MEILISEARCH_HOST=http://127.0.0.1:7700|' .env

      - name: Wait for MySQL
        run: |
          for i in {1..30}; do
            mysqladmin ping -h 127.0.0.1 -uroot --silent && break
            sleep 1
          done

      - name: Run migrations (MySQL sanity)
        run: php artisan migrate --force --no-interaction

      - name: Laravel Pint
        run: ./vendor/bin/pint --test

      - name: PHPStan
        run: ./vendor/bin/phpstan analyse --memory-limit=2G --no-progress

      - name: Pest tests
        run: ./vendor/bin/pest --colors=always

  web:
    name: Web — typecheck + build
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: qbazaar-web

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: qbazaar-web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
        env:
          # Build-time placeholder — the app fetches the real API at runtime
          # via NEXT_PUBLIC_API_URL; the build only needs a well-formed value.
          NEXT_PUBLIC_API_URL: http://localhost:8000/api/v1
