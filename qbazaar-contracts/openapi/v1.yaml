openapi: 3.1.0
info:
  title: QBazaar API
  version: 1.0.0
  description: |
    REST API for QBazaar — Qatar's friendly classifieds marketplace.

    All endpoints are versioned under `/api/v1/`. Authentication uses
    Sanctum Personal Access Tokens with a custom refresh-token layer.

    See [error-codes.md](../error-codes.md) for the full error catalog,
    and [events/messages.yaml](../events/messages.yaml) for WebSocket events.
  contact:
    name: Ahmed Jaber
    email: ahmedjaberdev@gmail.com
  license:
    name: Proprietary
servers:
  - url: http://localhost:8000
    description: Local dev (Laravel)
  - url: http://localhost:4010
    description: Local mock (Prism)
  - url: https://api.qbazaar.qa
    description: Production
tags:
  - name: Health
    description: Health check & version endpoints
  - name: Auth
    description: Registration, login, OTP, password reset
  - name: Account
    description: Authenticated user's own profile, sessions, privacy
  - name: Users
    description: Public profiles & user-targeted actions (block, view ads)
  - name: Categories
    description: Marketplace category tree, dynamic filters and fields
  - name: Locations
    description: Qatar regions and districts
  - name: Uploads
    description: Image uploads with multi-size conversions
  - name: Ads
    description: Ad CRUD, drafts, publishing, moderation lifecycle
  - name: Search
    description: Meilisearch-powered keyword + filter search
  - name: Favorites
    description: Save / unsave ads
  - name: Conversations
    description: Chat threads between buyer and seller
  - name: Messages
    description: Messages within a conversation
  - name: Offers
    description: Price offers attached to ads / conversations
  - name: Reports
    description: User reports on ads, users, conversations
  - name: Notifications
    description: In-app, email, and push notifications
  - name: CMS
    description: Static pages, help articles, support tickets

paths:
  /api/v1/health:
    get:
      tags: [Health]
      summary: Health check
      description: Returns 200 if the API is reachable. Used by uptime monitors and Sprint 0 verification.
      operationId: health
      security: []
      responses:
        '200':
          description: API is healthy
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthResponse'
              examples:
                healthy:
                  value:
                    success: true
                    data:
                      status: ok
                      version: 1.0.0
                      timestamp: '2026-05-20T10:00:00.000Z'

  # ──────────────────────────────────────────────────────────────────────────
  # Auth (Sprint 1)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/auth/register:
    post:
      tags: [Auth]
      summary: Register a new account
      operationId: authRegister
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
            examples:
              valid:
                value:
                  full_name: أحمد العلي
                  email: ahmed@example.qa
                  phone: '+97455123456'
                  password: 'Str0ng!Pass'
                  account_type: private
                  language: ar
                  accepted_terms: true
      responses:
        '201':
          description: Account created. An OTP has been sent to the phone.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
              examples:
                created:
                  value:
                    success: true
                    data:
                      user:
                        id: 01HM3XQVZP5KJWQR2K8N0DJSAW
                        full_name: أحمد العلي
                        email: ahmed@example.qa
                        phone: '+97455123456'
                        account_type: private
                        status: active
                        email_verified: false
                        phone_verified: false
                        language: ar
                        avatar_url: null
                        created_at: '2026-05-20T10:00:00.000Z'
                      tokens:
                        access_token: eyJhbGciOiJIUzI1NiJ9.eyJzdWIiOiIxIn0.signature
                        refresh_token: rt_01HM3XR0J2YTYAQ4HZD8E7K9TC
                        token_type: Bearer
                        expires_in: 900
        '422':
          $ref: '#/components/responses/ValidationError'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Sign in with email or phone + password
      operationId: authLogin
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
            examples:
              byEmail:
                value:
                  identifier: ahmed@example.qa
                  password: 'Str0ng!Pass'
              byPhone:
                value:
                  identifier: '+97455123456'
                  password: 'Str0ng!Pass'
      responses:
        '200':
          description: Sign-in successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                invalid:
                  value:
                    success: false
                    error:
                      code: AUTH_001
                      message_key: errors.auth.invalid.credentials
                      message: Invalid credentials
                      details: null
                      request_id: req_abc123
        '403':
          description: Account suspended
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: Revoke the current access token
      operationId: authLogout
      responses:
        '204':
          description: Logged out
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Exchange a refresh token for a new access + rotated refresh token
      operationId: authRefresh
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
            examples:
              valid:
                value:
                  refresh_token: rt_01HM3XR0J2YTYAQ4HZD8E7K9TC
      responses:
        '200':
          description: New token pair issued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AuthResponseEnvelope'
        '401':
          description: Refresh token expired or revoked
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/auth/send-otp:
    post:
      tags: [Auth]
      summary: Send a 6-digit OTP to the user's phone via Twilio
      operationId: authSendOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
            examples:
              valid:
                value:
                  phone: '+97455123456'
      responses:
        '202':
          description: OTP queued for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSendResponseEnvelope'
              examples:
                queued:
                  value:
                    success: true
                    data:
                      sent_to: '+97455123456'
                      expires_in: 300
                      can_resend_in: 60
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/verify-otp:
    post:
      tags: [Auth]
      summary: Verify a 6-digit OTP and mark the phone as verified
      operationId: authVerifyOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpVerifyRequest'
            examples:
              valid:
                value:
                  phone: '+97455123456'
                  code: '482915'
      responses:
        '200':
          description: OTP accepted, phone now verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                verified:
                  value:
                    success: true
                    data:
                      phone_verified: true
        '410':
          description: OTP expired
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
              examples:
                expired:
                  value:
                    success: false
                    error:
                      code: AUTH_004
                      message_key: errors.auth.otp.expired
                      message: OTP has expired
                      details: null
                      request_id: req_abc123
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/resend-otp:
    post:
      tags: [Auth]
      summary: Resend the OTP after the cooldown window
      operationId: authResendOtp
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OtpSendRequest'
      responses:
        '202':
          description: New OTP queued for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/OtpSendResponseEnvelope'
        '429':
          $ref: '#/components/responses/RateLimited'

  /api/v1/auth/forgot-password:
    post:
      tags: [Auth]
      summary: Send a password-reset link to the user's email
      operationId: authForgotPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ForgotPasswordRequest'
            examples:
              valid:
                value:
                  email: ahmed@example.qa
      responses:
        '202':
          description: If the email exists, a reset link has been sent.
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
              examples:
                queued:
                  value:
                    success: true
                    data:
                      message_key: messages.auth.reset_link_sent

  /api/v1/auth/reset-password:
    post:
      tags: [Auth]
      summary: Set a new password using the token from the reset email
      operationId: authResetPassword
      security: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ResetPasswordRequest'
            examples:
              valid:
                value:
                  email: ahmed@example.qa
                  token: 0f7e8d9c-...
                  password: 'NewStr0ng!Pass'
                  password_confirmation: 'NewStr0ng!Pass'
      responses:
        '200':
          description: Password updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/auth/send-email-verification:
    post:
      tags: [Auth]
      summary: Resend the email-verification link to the signed-in user
      operationId: authSendEmailVerification
      responses:
        '202':
          description: Verification link queued for delivery
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/verify-email/{id}/{hash}:
    get:
      tags: [Auth]
      summary: Confirm the email address via the signed link from the verification mail
      operationId: authVerifyEmail
      security: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
        - name: hash
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Email verified
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '410':
          description: Verification link expired or already consumed
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ──────────────────────────────────────────────────────────────────────────
  # Account (Sprint 2 — Wave 1)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/account/summary:
    get:
      tags: [Account]
      summary: At-a-glance counters for the dashboard
      operationId: accountSummary
      responses:
        '200':
          description: Counters returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountSummaryEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'

  /api/v1/account/profile:
    get:
      tags: [Account]
      summary: Get the signed-in user's full profile + privacy settings
      operationId: accountProfileShow
      responses:
        '200':
          description: Profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Account]
      summary: Update the editable subset of the profile (full_name + language)
      operationId: accountProfileUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateProfileRequest'
            examples:
              valid:
                value:
                  full_name: Ahmed Al-Ali
                  language: ar
      responses:
        '200':
          description: Profile updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AccountProfileEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/account/password:
    put:
      tags: [Account]
      summary: Change the signed-in user's password
      operationId: accountPasswordUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePasswordRequest'
            examples:
              valid:
                value:
                  current_password: 'OldStr0ng!Pass'
                  password: 'NewStr0ng!Pass#1'
                  password_confirmation: 'NewStr0ng!Pass#1'
      responses:
        '204':
          description: Password updated, other sessions revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Validation failed or current password incorrect (USER_004)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/sessions:
    get:
      tags: [Account]
      summary: List the user's active sessions
      operationId: accountSessionsIndex
      responses:
        '200':
          description: Sessions returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionsListEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/account/sessions/{id}:
    delete:
      tags: [Account]
      summary: Revoke a single session by id
      operationId: accountSessionsDestroy
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: Session revoked
        '401':
          $ref: '#/components/responses/Unauthorized'
        '404':
          description: Session not found or not owned by the caller (USER_001)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/verification-status:
    get:
      tags: [Account]
      summary: Email / phone / business / KYC verification snapshot
      operationId: accountVerificationStatus
      responses:
        '200':
          description: Verification status returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VerificationStatusEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/account/privacy-settings:
    get:
      tags: [Account]
      summary: Get the user's privacy preferences
      operationId: accountPrivacyShow
      responses:
        '200':
          description: Privacy settings returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacySettingsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
    put:
      tags: [Account]
      summary: Replace the user's privacy preferences
      operationId: accountPrivacyUpdate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/PrivacySettings'
            examples:
              valid:
                value:
                  show_phone: true
                  show_email: false
                  allow_chat: true
                  indexed_by_search: true
      responses:
        '200':
          description: Privacy settings updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PrivacySettingsEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'

  /api/v1/account/blocked-users:
    get:
      tags: [Account]
      summary: Paginated list of users the caller has blocked
      operationId: accountBlockedUsers
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Blocked users returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockedUsersEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ──────────────────────────────────────────────────────────────────────────
  # Account lifecycle (Sprint 2 — Wave 2)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/account/data-export-request:
    post:
      tags: [Account]
      summary: Request a GDPR-style export of the caller's personal data
      description: |
        Throttled to 1 export per user per 24h via Redis lock. Dispatches
        `ExportUserDataJob` to the `low` queue; the user receives an email
        with a signed download link (TTL 48h) when the export finishes.
      operationId: accountDataExportRequest
      responses:
        '202':
          description: Export queued
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DataExportRequestEnvelope'
              examples:
                queued:
                  value:
                    success: true
                    data:
                      requested_at: '2026-05-23T10:00:00+03:00'
                      eta_minutes: 5
                      status: queued
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          description: Already requested an export in the last 24h
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/data-export/{id}:
    get:
      tags: [Account]
      summary: Download a previously-generated data export
      description: |
        Requires a signed URL (TTL 48h) plus a Sanctum bearer for the owner.
        The export id must start with the caller's user-id prefix.
      operationId: accountDataExportDownload
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
        - name: expires
          in: query
          required: true
          schema:
            type: integer
        - name: signature
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: JSON file streamed
          content:
            application/json:
              schema:
                type: string
                format: binary
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/Forbidden'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/account/deactivate:
    post:
      tags: [Account]
      summary: Soft-disable the caller's account
      description: |
        Verifies the current password, flips the user's status to
        `deactivated`, and burns every refresh token + Sanctum PAT. The user
        can self-reactivate by signing back in within 30 days.
      operationId: accountDeactivate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeactivateAccountRequest'
            examples:
              valid:
                value:
                  password: 'Str0ng!Pass'
                  reason: 'Taking a break'
      responses:
        '204':
          description: Account deactivated
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Wrong password (USER_005) or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  /api/v1/account/delete-request:
    delete:
      tags: [Account]
      summary: Schedule the caller's account for permanent deletion
      description: |
        Verifies the password, sets status `pending_deletion`, records
        `deletion_requested_at`, burns all sessions, and queues
        `DeleteAccountJob` for 30 days later. Signing back in within the
        grace window implicitly cancels the request — the queued job
        re-checks the status before doing anything destructive.
      operationId: accountDeleteRequest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DeleteAccountRequest'
            examples:
              valid:
                value:
                  password: 'Str0ng!Pass'
                  reason: 'Found another platform'
      responses:
        '202':
          description: Deletion scheduled
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/DeleteAccountResponseEnvelope'
              examples:
                scheduled:
                  value:
                    success: true
                    data:
                      deletion_scheduled_at: '2026-06-22T10:00:00+03:00'
                      status: pending_deletion
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          description: Wrong password (USER_005) or validation failure
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ──────────────────────────────────────────────────────────────────────────
  # Uploads (Sprint 2 — Wave 2 ships avatar; Sprint 4 adds ad images)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/uploads/avatar:
    post:
      tags: [Uploads]
      summary: Upload / replace the caller's avatar
      description: |
        Multipart upload. MIME must be jpeg / png / webp, max 5 MB. The file
        is stored via Spatie MediaLibrary in the `avatar` collection with
        `thumb` (200×200) and `medium` (480×480) conversions. Replaces any
        existing avatar.
      operationId: uploadsAvatar
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [avatar]
              properties:
                avatar:
                  type: string
                  format: binary
      responses:
        '200':
          description: Avatar stored, conversions ready
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AvatarUploadEnvelope'
              examples:
                uploaded:
                  value:
                    success: true
                    data:
                      avatar_url: 'https://cdn.qbazaar.qa/u/01/avatar.jpg'
                      avatar_thumb_url: 'https://cdn.qbazaar.qa/u/01/conversions/avatar-thumb.jpg'
                      avatar_medium_url: 'https://cdn.qbazaar.qa/u/01/conversions/avatar-medium.jpg'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '422':
          $ref: '#/components/responses/ValidationError'
        '413':
          description: File exceeds 5 MB limit (UPLOAD_001)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'

  # ──────────────────────────────────────────────────────────────────────────
  # Users (Sprint 2 — Wave 1)
  # ──────────────────────────────────────────────────────────────────────────
  /api/v1/users/{user}/block:
    post:
      tags: [Users]
      summary: Block a user
      operationId: usersBlock
      parameters:
        - name: user
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
      responses:
        '200':
          description: User blocked (idempotent)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/BlockResultEnvelope'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          description: Cannot block an administrator (USER_002)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'
        '422':
          description: Cannot block yourself (USER_003)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorEnvelope'
    delete:
      tags: [Users]
      summary: Unblock a user (idempotent)
      operationId: usersUnblock
      parameters:
        - name: user
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
      responses:
        '204':
          description: Unblocked (or nothing to unblock)
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/users/{user}/public-profile:
    get:
      tags: [Users]
      summary: Public read-only profile of any active user
      operationId: usersPublicProfile
      security: []
      parameters:
        - name: user
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
      responses:
        '200':
          description: Public profile returned
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PublicProfileEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/users/{user}/ads:
    get:
      tags: [Users]
      summary: Public list of a user's active ads (stub until Sprint 5)
      operationId: usersAds
      security: []
      parameters:
        - name: user
          in: path
          required: true
          schema:
            $ref: '#/components/schemas/ULID'
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
      responses:
        '200':
          description: Paginated ads (empty stub)
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SuccessEnvelope'
        '404':
          $ref: '#/components/responses/NotFound'

components:
  schemas:
    # ─── Envelopes ──────────────────────────────────────────────────
    SuccessEnvelope:
      type: object
      required: [success, data]
      properties:
        success:
          type: boolean
          enum: [true]
        data:
          description: Payload — shape varies per endpoint
        meta:
          $ref: '#/components/schemas/PaginationMeta'

    ErrorEnvelope:
      type: object
      required: [success, error]
      properties:
        success:
          type: boolean
          enum: [false]
        error:
          $ref: '#/components/schemas/Error'

    Error:
      type: object
      required: [code, message_key, message]
      properties:
        code:
          type: string
          description: Stable error code from error-codes.md
          example: AUTH_001
        message_key:
          type: string
          description: i18n key the client should look up
          example: errors.auth.invalid_credentials
        message:
          type: string
          description: Human-readable fallback in the requested locale
          example: Invalid credentials
        details:
          oneOf:
            - type: 'null'
            - type: object
              additionalProperties:
                type: array
                items:
                  type: string
          description: Field-level validation errors keyed by field name
        request_id:
          type: string
          description: Correlation id for log lookups
          example: req_abc123

    PaginationMeta:
      type: object
      properties:
        current_page:
          type: integer
          example: 1
        per_page:
          type: integer
          example: 20
        total:
          type: integer
          example: 156
        has_more:
          type: boolean
          example: true
        next_cursor:
          type: [string, 'null']
          description: For cursor-based endpoints; null on the last page
          example: null

    # ─── Primitives ────────────────────────────────────────────────
    ULID:
      type: string
      pattern: '^[0-9A-HJKMNP-TV-Z]{26}$'
      example: 01HM3XQVZP5KJWQR2K8N0DJSAW

    Money:
      type: object
      required: [amount, currency, formatted]
      properties:
        amount:
          type: number
          format: float
          example: 5000
        currency:
          type: string
          example: QAR
        formatted:
          type: string
          example: '5,000 ر.ق'

    TranslatedString:
      type: object
      properties:
        ar:
          type: string
        en:
          type: string

    # ─── Domain ──────────────────────────────────────────────────────
    HealthResponse:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [status, version, timestamp]
              properties:
                status:
                  type: string
                  enum: [ok]
                version:
                  type: string
                  example: 1.0.0
                timestamp:
                  type: string
                  format: date-time

    # ── Auth (Sprint 1) ──────────────────────────────────────────────
    User:
      type: object
      required: [id, full_name, email, phone, account_type, status, email_verified, phone_verified, language, created_at]
      properties:
        id:
          $ref: '#/components/schemas/ULID'
        full_name:
          type: string
          example: أحمد العلي
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+974[0-9]{8}$'
          example: '+97455123456'
        account_type:
          type: string
          enum: [private, business]
        status:
          type: string
          enum: [active, suspended, deactivated, pending_deletion]
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        language:
          type: string
          enum: [ar, en]
        avatar_url:
          type: [string, 'null']
          format: uri
        avatar_thumb_url:
          type: [string, 'null']
          format: uri
          description: 200×200 conversion served by MediaLibrary
        avatar_medium_url:
          type: [string, 'null']
          format: uri
          description: 480×480 conversion served by MediaLibrary
        created_at:
          type: string
          format: date-time

    Token:
      type: object
      required: [access_token, refresh_token, token_type, expires_in]
      properties:
        access_token:
          type: string
          description: Sanctum personal access token, ~15-minute lifetime
        refresh_token:
          type: string
          description: Opaque token used by POST /auth/refresh, ~30-day lifetime, rotated on every refresh
        token_type:
          type: string
          enum: [Bearer]
        expires_in:
          type: integer
          description: Seconds until access_token expires
          example: 900

    RegisterRequest:
      type: object
      required: [full_name, email, phone, password, account_type, accepted_terms]
      properties:
        full_name:
          type: string
          minLength: 3
          maxLength: 80
        email:
          type: string
          format: email
        phone:
          type: string
          pattern: '^\+974[0-9]{8}$'
          example: '+97455123456'
        password:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, number and symbol
          example: 'Str0ng!Pass'
        account_type:
          type: string
          enum: [private, business]
        language:
          type: string
          enum: [ar, en]
        accepted_terms:
          type: boolean
          enum: [true]

    LoginRequest:
      type: object
      required: [identifier, password]
      properties:
        identifier:
          type: string
          description: Either email OR Qatar phone (+974XXXXXXXX)
          example: ahmed@example.qa
        password:
          type: string
          example: 'Str0ng!Pass'

    RefreshRequest:
      type: object
      required: [refresh_token]
      properties:
        refresh_token:
          type: string

    OtpSendRequest:
      type: object
      required: [phone]
      properties:
        phone:
          type: string
          pattern: '^\+974[0-9]{8}$'
          example: '+97455123456'

    OtpVerifyRequest:
      type: object
      required: [phone, code]
      properties:
        phone:
          type: string
          pattern: '^\+974[0-9]{8}$'
          example: '+97455123456'
        code:
          type: string
          pattern: '^[0-9]{6}$'
          example: '482915'

    ForgotPasswordRequest:
      type: object
      required: [email]
      properties:
        email:
          type: string
          format: email

    ResetPasswordRequest:
      type: object
      required: [email, token, password, password_confirmation]
      properties:
        email:
          type: string
          format: email
        token:
          type: string
        password:
          type: string
          minLength: 8
        password_confirmation:
          type: string
          minLength: 8

    AuthResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [user, tokens]
              properties:
                user:
                  $ref: '#/components/schemas/User'
                tokens:
                  $ref: '#/components/schemas/Token'

    OtpSendResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [sent_to, expires_in, can_resend_in]
              properties:
                sent_to:
                  type: string
                  description: Phone number the OTP was sent to (masked in production logs)
                expires_in:
                  type: integer
                  description: Seconds until the OTP becomes invalid
                  example: 300
                can_resend_in:
                  type: integer
                  description: Seconds the client must wait before calling resend-otp
                  example: 60

    # ── Account & Users (Sprint 2 Wave 1) ───────────────────────────
    AccountSummary:
      type: object
      required: [my_ads, drafts, conversations, unread_notifications, favorites]
      properties:
        my_ads:
          type: integer
          example: 0
        drafts:
          type: integer
          example: 0
        conversations:
          type: integer
          example: 0
        unread_notifications:
          type: integer
          example: 0
        favorites:
          type: integer
          example: 0

    AccountSummaryEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountSummary'

    PrivacySettings:
      type: object
      required: [show_phone, show_email, allow_chat, indexed_by_search]
      properties:
        show_phone:
          type: boolean
          default: true
        show_email:
          type: boolean
          default: false
        allow_chat:
          type: boolean
          default: true
        indexed_by_search:
          type: boolean
          default: true

    PrivacySettingsEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PrivacySettings'

    AccountProfile:
      allOf:
        - $ref: '#/components/schemas/User'
        - type: object
          required: [privacy_settings]
          properties:
            privacy_settings:
              $ref: '#/components/schemas/PrivacySettings'

    AccountProfileEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AccountProfile'

    UpdateProfileRequest:
      type: object
      required: [full_name, language]
      properties:
        full_name:
          type: string
          minLength: 3
          maxLength: 80
        language:
          type: string
          enum: [ar, en]

    UpdatePasswordRequest:
      type: object
      required: [current_password, password, password_confirmation]
      properties:
        current_password:
          type: string
        password:
          type: string
          minLength: 8
          description: Must contain uppercase, lowercase, number and symbol
        password_confirmation:
          type: string
          minLength: 8

    Session:
      type: object
      required: [id, name, is_current]
      properties:
        id:
          type: string
          example: '17'
        name:
          type: string
          example: api
        last_used_at:
          type: [string, 'null']
          format: date-time
        created_at:
          type: [string, 'null']
          format: date-time
        expires_at:
          type: [string, 'null']
          format: date-time
        device_label:
          type: [string, 'null']
          example: web / Chrome
        ip_address:
          type: [string, 'null']
          example: 1.2.3.4
        is_current:
          type: boolean

    SessionsListEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/Session'

    VerificationStatus:
      type: object
      required: [email_verified, phone_verified, business_verified, kyc_status]
      properties:
        email_verified:
          type: boolean
        phone_verified:
          type: boolean
        business_verified:
          type: boolean
          description: Placeholder until Phase 2 business-verification ships
        kyc_status:
          type: string
          enum: [none, pending, approved, rejected]
          description: Placeholder until Phase 2 KYC ships

    VerificationStatusEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/VerificationStatus'

    BlockedUser:
      type: object
      required: [id, full_name, blocked_at]
      properties:
        id:
          $ref: '#/components/schemas/ULID'
        full_name:
          type: string
        avatar_url:
          type: [string, 'null']
          format: uri
        blocked_at:
          type: string
          format: date-time

    BlockedUsersEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: array
              items:
                $ref: '#/components/schemas/BlockedUser'
            meta:
              $ref: '#/components/schemas/PaginationMeta'

    BlockResultEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [blocked, user_id]
              properties:
                blocked:
                  type: boolean
                  example: true
                user_id:
                  $ref: '#/components/schemas/ULID'

    DeactivateAccountRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
          description: Current account password (defence-in-depth).
        reason:
          type: [string, 'null']
          maxLength: 500
          description: Optional free-text reason surfaced in the activity log.

    DeleteAccountRequest:
      type: object
      required: [password]
      properties:
        password:
          type: string
        reason:
          type: [string, 'null']
          maxLength: 500

    DeleteAccountResponseEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              type: object
              required: [deletion_scheduled_at, status]
              properties:
                deletion_scheduled_at:
                  type: string
                  format: date-time
                status:
                  type: string
                  enum: [pending_deletion]

    DataExportRequest:
      type: object
      required: [requested_at, eta_minutes, status]
      properties:
        requested_at:
          type: string
          format: date-time
        eta_minutes:
          type: integer
          example: 5
        status:
          type: string
          enum: [queued]

    DataExportRequestEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/DataExportRequest'

    AvatarUploadResponse:
      type: object
      required: [avatar_url, avatar_thumb_url, avatar_medium_url]
      properties:
        avatar_url:
          type: [string, 'null']
          format: uri
        avatar_thumb_url:
          type: [string, 'null']
          format: uri
        avatar_medium_url:
          type: [string, 'null']
          format: uri

    AvatarUploadEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/AvatarUploadResponse'

    PublicProfile:
      type: object
      required: [id, full_name, account_type, joined_at, verification_badges, ads_count]
      properties:
        id:
          $ref: '#/components/schemas/ULID'
        full_name:
          type: string
        avatar_url:
          type: [string, 'null']
          format: uri
        account_type:
          type: string
          enum: [private, business]
        business_name:
          type: [string, 'null']
        joined_at:
          type: string
          format: date-time
        phone:
          type: string
          description: Only present when the target user has `show_phone=true`
        email:
          type: string
          format: email
          description: Only present when the target user has `show_email=true`
        verification_badges:
          type: object
          required: [email_verified, phone_verified, business_verified]
          properties:
            email_verified:
              type: boolean
            phone_verified:
              type: boolean
            business_verified:
              type: boolean
        ads_count:
          type: integer
          example: 0

    PublicProfileEnvelope:
      allOf:
        - $ref: '#/components/schemas/SuccessEnvelope'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/PublicProfile'

  responses:
    Unauthorized:
      description: Missing or invalid authentication token
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            unauthorized:
              value:
                success: false
                error:
                  code: AUTH_010
                  message_key: errors.auth.token_invalid
                  message: Token is invalid or expired
                  details: null
                  request_id: req_abc123

    Forbidden:
      description: Authenticated but not authorized for this resource
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    NotFound:
      description: Resource does not exist or is hidden
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

    ValidationError:
      description: Request body failed validation
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'
          examples:
            validation_failed:
              value:
                success: false
                error:
                  code: VALIDATION_FAILED
                  message_key: errors.validation_failed
                  message: The given data was invalid
                  details:
                    email: ['The email has already been taken']
                    phone: ['The phone format is invalid']
                  request_id: req_abc123

    RateLimited:
      description: Too many requests
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/ErrorEnvelope'

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: Sanctum token
      description: |
        Issued by `POST /auth/login`. Include as `Authorization: Bearer <access_token>`.
        Expires after 15 minutes — refresh via `POST /auth/refresh`.

security:
  - bearerAuth: []
