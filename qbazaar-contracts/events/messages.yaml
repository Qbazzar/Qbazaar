# QBazaar — WebSocket Events Spec
#
# Broadcast adapter: Laravel Reverb (Pusher-compatible).
# Clients: Laravel Echo + pusher-js (Next.js) and pusher_channels_flutter (Flutter, future).
#
# Channel naming:
#   - Private channels require auth via POST /broadcasting/auth (Sanctum bearer)
#   - Format: <type>.<id> — e.g. `conversation.01HM...`, `user.01HM...`
#
# Event names use dot notation: `<domain>.<action>` — e.g. `message.sent`.
#
# This file is the spec. Backend tests assert the payload shape matches.
# Frontend tests use these definitions to type Echo event handlers.

version: 1
channels:
  user:
    pattern: 'user.{userId}'
    visibility: private
    description: Per-user notifications stream. Subscribed once on app boot.
    events:
      - notification.created
      - ad.approved
      - ad.rejected
      - offer.received
      - saved_search.match
      - message.sent          # also fan-out so the badge updates while the chat pane is closed
      - conversation.read     # the other side marked our messages as read

  conversation:
    pattern: 'conversation.{conversationId}'
    visibility: private
    description: Per-conversation chat. Subscribed when the user opens a chat.
    events:
      - message.sent
      - user.typing
      - offer.updated

events:
  # ── Messaging (Sprint 8 Wave A) ─────────────────────────────────
  message.sent:
    channels:
      - conversation.{conversationId}    # for clients with the thread open
      - user.{recipientId}               # for the recipient's badge / inbox row
    description: |
      A new message was posted to the conversation. Broadcast on TWO
      channels — clients listening to both must dedupe by `message.id`.
    payload:
      type: object
      required: [message, conversation]
      properties:
        message:
          $ref: '../openapi/v1.yaml#/components/schemas/Message'
        conversation:
          type: object
          required: [id, last_message_preview, last_message_at, unread_count]
          properties:
            id: { type: string }
            last_message_preview: { type: string, nullable: true }
            last_message_at: { type: string, format: date-time, nullable: true }
            unread_count:
              type: integer
              minimum: 0
              description: Recipient-relative count (not sender-relative).

  conversation.read:
    channels:
      - user.{otherUserId}               # the user whose messages were just read
    description: |
      The counterparty marked the conversation as read. Only emitted
      when at least one message actually transitioned to read state.
    payload:
      type: object
      required: [conversation_id, reader_id, read_at]
      properties:
        conversation_id:
          type: string
        reader_id:
          type: string
          description: The user who just hit /read.
        read_at:
          type: string
          format: date-time

  user.typing:
    channel: conversation.{conversationId}
    description: A participant is currently typing (debounced 3s).
    payload:
      type: object
      required: [user_id]
      properties:
        user_id:
          type: string

  # ── Offers (Sprint 9) ───────────────────────────────────────────
  offer.updated:
    channel: conversation.{conversationId}
    description: An offer in this conversation changed state (accept / reject / counter).
    payload:
      type: object
      required: [offer]
      properties:
        offer:
          $ref: 'https://qbazaar.qa/spec#/Offer'

  # ── Notifications (Sprint 10) ───────────────────────────────────
  notification.created:
    channel: user.{userId}
    description: A new in-app notification was created for the user.
    payload:
      type: object
      required: [notification]
      properties:
        notification:
          $ref: 'https://qbazaar.qa/spec#/Notification'

  # ── Ad lifecycle (Sprint 5+10 cross) ───────────────────────────
  ad.approved:
    channel: user.{userId}
    description: An ad owned by the user passed moderation and went live.
    payload:
      type: object
      required: [ad_id]
      properties:
        ad_id:
          type: string

  ad.rejected:
    channel: user.{userId}
    description: An ad owned by the user was rejected. `reason` carries human text.
    payload:
      type: object
      required: [ad_id, reason]
      properties:
        ad_id:
          type: string
        reason:
          type: string

  offer.received:
    channel: user.{userId}
    description: Someone made an offer on one of the user's ads.
    payload:
      type: object
      required: [offer_id, ad_id]
      properties:
        offer_id:
          type: string
        ad_id:
          type: string

  saved_search.match:
    channel: user.{userId}
    description: A saved search has new matching ads since last check.
    payload:
      type: object
      required: [saved_search_id, new_ads_count]
      properties:
        saved_search_id:
          type: string
        new_ads_count:
          type: integer

reconnection:
  strategy: exponential-backoff
  initial_delay_ms: 1000
  max_delay_ms: 30000
  on_reconnect: |
    After reconnecting, the client MUST fetch any missed events via REST:
      - GET /conversations/{id}/messages?after={last_seen_at}
      - GET /notifications?after={last_seen_at}
    The WebSocket alone does NOT guarantee delivery.

