<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>Bazzar — Qatar's friendly classifieds marketplace</title>
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --coral: #EE8765;
      --terracotta: #B85A45;
      --cream-50: #FAF6F1;
      --cream-100: #FFFFFF;
      --cream-200: #F1EBE2;
      --ink-900: #2A2622;
      --ink-700: #4A4540;
      --ink-500: #8A847C;
      --ink-200: #E8E2D8;
      --ink-300: #D8CFC0;
      --sage: #6B8E6B;
      --font-ui: 'DM Sans', -apple-system, system-ui, sans-serif;
      --font-display: 'Instrument Serif', Georgia, serif;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; background: var(--cream-50); color: var(--ink-900); }
    body { font-family: var(--font-ui); -webkit-font-smoothing: antialiased; text-rendering: optimizeLegibility; }
    a { color: inherit; }
    button { font: inherit; }
    img { max-width: 100%; display: block; }
    .container { max-width: 1240px; margin: 0 auto; }

    /* Responsive grid utilities */
    .grid-4 { display: grid; grid-template-columns: repeat(4, 1fr); gap: 20px; }
    .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 20px; }

    /* Responsiveness */
    .mobile-only { display: none; }
    @media (max-width: 1100px) {
      .grid-4 { grid-template-columns: repeat(3, 1fr); }
    }
    @media (max-width: 900px) {
      .grid-4 { grid-template-columns: repeat(2, 1fr); }
      .grid-3 { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 760px) {
      .desktop-only { display: none !important; }
      .mobile-only { display: flex; }
      .container > section, .container { padding-left: 16px !important; padding-right: 16px !important; }
      /* Stack grid layouts */
      [style*="grid-template-columns: 1.15fr 1fr"],
      [style*="grid-template-columns: 1.4fr 1fr"],
      [style*="grid-template-columns: 1fr 380px"],
      [style*="grid-template-columns: 280px 1fr"],
      [style*="grid-template-columns: 240px 1fr"],
      [style*="grid-template-columns: 340px 1fr"],
      [style*="grid-template-columns: 1fr 1fr"],
      [style*="grid-template-columns: 1.4fr 1fr 1fr"] {
        grid-template-columns: 1fr !important;
      }
    }
    @media (max-width: 540px) {
      .grid-4, .grid-3 { grid-template-columns: 1fr; }
    }

    /* Reset some defaults */
    input, select, textarea { font-family: var(--font-ui); }
    h1, h2, h3, h4 { margin: 0; }

    /* Subtle scrollbar */
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-thumb { background: var(--ink-200); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--ink-500); }
  </style>
</head>
<body>
  <div id="root"></div>

  <!-- React + Babel pinned -->
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <!-- Data + Tweaks helpers + components in order -->
  <script type="text/babel" src="src/data.jsx"></script>
  <script type="text/babel" src="src/tweaks-panel.jsx"></script>
  <script type="text/babel" src="src/layout.jsx"></script>
  <script type="text/babel" src="src/pages/home.jsx"></script>
  <script type="text/babel" src="src/pages/search.jsx"></script>
  <script type="text/babel" src="src/pages/detail.jsx"></script>
  <script type="text/babel" src="src/pages/post.jsx"></script>
  <script type="text/babel" src="src/pages/messages.jsx"></script>
  <script type="text/babel" src="src/pages/profile.jsx"></script>
  <script type="text/babel" src="src/pages/saved.jsx"></script>
  <script type="text/babel" src="src/pages/auth.jsx"></script>
  <script type="text/babel" src="src/pages/help.jsx"></script>
  <script type="text/babel" src="src/app.jsx"></script>
</body>
</html>
