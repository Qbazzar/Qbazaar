# Apache reverse-proxy include for the FRONTEND vhost (qbazzar.fleeteye.de).
# Routes everything to the Next.js systemd service on 127.0.0.1:3000, EXCEPT
# /.well-known (left to Apache so AutoSSL/Let's Encrypt renewal keeps working).
#
# Install on cPanel (root) — SSL vhost include:
#   mkdir -p /etc/apache2/conf.d/userdata/ssl/2_4/fleeteye/qbazzar.fleeteye.de
#   cp deploy/apache/qbazzar.fleeteye.de.include.conf \
#      /etc/apache2/conf.d/userdata/ssl/2_4/fleeteye/qbazzar.fleeteye.de/proxy.conf
#   # (repeat under .../std/2_4/... for the plain-HTTP vhost if you don't force-redirect)
#   /scripts/ensure_vhost_includes --user=fleeteye
#   apachectl configtest && systemctl restart httpd
#
# Requires modules: proxy, proxy_http, headers, rewrite.

ProxyPreserveHost On
RequestHeader set X-Forwarded-Proto "https"

# Don't proxy ACME challenges — Apache serves them for SSL renewal.
ProxyPass /.well-known !

ProxyPass        / http://127.0.0.1:3000/ retry=0
ProxyPassReverse / http://127.0.0.1:3000/
