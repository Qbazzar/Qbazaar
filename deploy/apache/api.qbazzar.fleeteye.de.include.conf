# Apache include for the API vhost (api.qbazzar.fleeteye.de).
# The docroot already points at qbazaar-api/public (PHP-FPM serves the REST
# API + /api/v1/broadcasting/auth normally). This include ONLY adds the
# websocket upgrade proxy so the browser can reach Reverb over wss.
#
# Browser connects to: wss://api.qbazzar.fleeteye.de/app/<REVERB_APP_KEY>
#
# Install on cPanel (root) — SSL vhost include:
#   mkdir -p /etc/apache2/conf.d/userdata/ssl/2_4/fleeteye/api.qbazzar.fleeteye.de
#   cp deploy/apache/api.qbazzar.fleeteye.de.include.conf \
#      /etc/apache2/conf.d/userdata/ssl/2_4/fleeteye/api.qbazzar.fleeteye.de/reverb.conf
#   /scripts/ensure_vhost_includes --user=fleeteye
#   apachectl configtest && systemctl restart httpd
#
# Requires modules: proxy, proxy_http, proxy_wstunnel, rewrite.

RewriteEngine On
# Upgrade only the Reverb Pusher-protocol paths (/app, /apps) to the local
# websocket server. Everything else falls through to PHP-FPM.
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule ^/?(app|apps)/(.*)$ ws://127.0.0.1:8080/$1/$2 [P,L]
ProxyPassReverse /app  ws://127.0.0.1:8080/app
ProxyPassReverse /apps ws://127.0.0.1:8080/apps
