# Apache include for the API vhost (api.qbazaar.fleeteye.de).
#
# Two responsibilities:
#  1. Grant access + AllowOverride for the Laravel public docroot, and pin the
#     PHP version in the VHOST (not .htaccess). cPanel writes its PHP-version
#     AddHandler into the docroot's .htaccess, which `git reset --hard` wipes on
#     every deploy — so we set it here, where the deploy can't touch it.
#  2. Proxy the Reverb websocket (/app, /apps) to the local server.
#
# Install on cPanel (root) — place in BOTH std + ssl tiers:
#   for t in std ssl; do
#     d=/etc/apache2/conf.d/userdata/$t/2_4/fleeteye/api.qbazaar.fleeteye.de
#     mkdir -p "$d"; cp deploy/apache/api.qbazaar.fleeteye.de.include.conf "$d/qbazaar.conf"
#   done
#   /scripts/ensure_vhost_includes --user=fleeteye
#   apachectl configtest && systemctl restart httpd
#
# Requires modules: proxy, proxy_http, proxy_wstunnel, rewrite, mime.

<Directory "/home/fleeteye/public_html/qbazaar/qbazaar-api/public">
    AllowOverride All
    Require all granted
    Options +FollowSymLinks -Indexes
    # Pin PHP 8.4 at the vhost level so it survives the deploy's git reset
    # (cPanel's per-docroot .htaccess handler line gets reverted otherwise).
    <IfModule mime_module>
        AddHandler application/x-httpd-ea-php84 .php .php8 .phtml
    </IfModule>
</Directory>

# Browser connects to: wss://api.qbazaar.fleeteye.de/app/<REVERB_APP_KEY>
RewriteEngine On
RewriteCond %{HTTP:Upgrade} =websocket [NC]
RewriteRule ^/?(app|apps)/(.*)$ ws://127.0.0.1:8080/$1/$2 [P,L]
ProxyPassReverse /app  ws://127.0.0.1:8080/app
ProxyPassReverse /apps ws://127.0.0.1:8080/apps
